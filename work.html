<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Black Mesa Welding & Machining — view our work and fabrication projects.">
  <title>Our Work — Black Mesa Welding & Machining</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="preload" href="assets/bull-skull.mp4" as="video" media="(max-width: 768px)">
  <link rel="prefetch" href="assets/bull-skull-wide.mp4" as="video" media="(min-width: 769px)">
  <script src="transition.js"></script>
</head>
<body class="work-page">
  <div class="work-bg" aria-hidden="true">
    <div class="page-bg-overlay"></div>
    <video
      class="page-bg-video page-bg-video--portrait"
      id="heroVideoPortrait"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
    >
      <source src="assets/bull-skull.mp4" type="video/mp4">
    </video>
    <video
      class="page-bg-video page-bg-video--landscape"
      id="heroVideoLandscape"
      autoplay
      muted
      loop
      playsinline
      preload="none"
    >
      <source data-src="assets/bull-skull-wide.mp4" type="video/mp4">
    </video>
  </div>

  <header class="navbar site-header">
    <a href="index.html" class="site-logo" aria-label="Black Mesa Welding &amp; Machining — Home">
      <img src="assets/black-mesa-logo.jpg" alt="Black Mesa Welding &amp; Machining">
    </a>
    <a href="index.html" class="nav-link" id="navHome">Home</a>
  </header>

  <nav class="work-tabs work-nav-ctas" aria-label="Primary actions">
    <button type="button" class="hero-cta btn-metallic work-nav-cta is-active" id="btnViewWork">
      View Our Work
    </button>
    <a href="quote.html" class="hero-cta btn-metallic work-nav-cta" id="btnQuote">
      Get a Quote
    </a>
  </nav>

  <div class="work-content-panel" id="workContentPanel" hidden>
    <div class="work-gallery-tabs" role="tablist" aria-label="Work gallery type" id="workGalleryTabs" hidden>
      <button type="button" class="work-gallery-tab" id="tabPhotos" role="tab" aria-selected="false" aria-controls="panelPhotos">
        Photos
      </button>
      <button type="button" class="work-gallery-tab" id="tabVideos" role="tab" aria-selected="false" aria-controls="panelVideos">
        Videos
      </button>
    </div>
    <div class="work-photos-panel" id="workPhotosPanel" role="tabpanel" aria-labelledby="tabPhotos" hidden>
      <div class="work-media-grid" id="panelPhotos"></div>
    </div>

    <div class="work-videos-panel" id="workVideosPanel" role="tabpanel" aria-labelledby="tabVideos" hidden>
      <div class="work-media-grid" id="panelVideos">
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-01.mp4" type="video/mp4">
          </video>
        </article>
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-02.mp4" type="video/mp4">
          </video>
        </article>
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-03.mp4" type="video/mp4">
          </video>
        </article>
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-04.mp4" type="video/mp4">
          </video>
        </article>
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-05.mp4" type="video/mp4">
          </video>
        </article>
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-06.mp4" type="video/mp4">
          </video>
        </article>
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-07.mp4" type="video/mp4">
          </video>
        </article>
        <article class="media-grid-item media-grid-item--video">
          <video class="project-video" autoplay muted loop playsinline preload="auto">
            <source src="assets/projects/project-08.mp4" type="video/mp4">
          </video>
        </article>
      </div>
    </div>
  </div>

  <script src="bg-video.js"></script>
  <script src="work.js"></script>
</body>
</html>
